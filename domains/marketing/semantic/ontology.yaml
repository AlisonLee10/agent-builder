# =============================================================================
# domains/marketing/semantic/ontology.yaml
#
# Entity definitions and relationships for the B2B Marketing domain.
# Loaded by SemanticLayer (Phase 2c).
#
# WHY THIS EXISTS
# The LLM doesn't inherently know that "follow-up email" maps to
# sequence_step.type: follow_up, or that "MQL" belongs to the lead_stage
# entity. This ontology provides those mappings so the Generator produces
# correct YAML without guessing.
# =============================================================================

version: "1.0"

entities:

  # ── Task types ────────────────────────────────────────────────────────────
  # These are the values used in AgentConfig.task_type (Phase 3a).
  - name: task_type
    description: The type of agent workflow to execute
    values:
      email_generation:    "Generate one or more email drafts (cold, nurture, follow-up, break-up)"
      research_summary:    "Search, retrieve, and summarize external information"
      competitor_analysis: "Monitor competitors and suggest differentiation"
      campaign_brief:      "Generate a full campaign brief from product + audience inputs"
      approval_routing:    "Route content for human review via Slack or email"
      scheduling:          "Set up a cron-based recurring workflow"

  # ── Email sub-types ───────────────────────────────────────────────────────
  - name: email_type
    parent: task_type.email_generation
    values:
      cold_outreach:  "First contact with a prospect who has not engaged before"
      follow_up:      "Second or third touch after no response"
      nurture:        "Drip email for a prospect already in the funnel"
      breakup:        "Final touch before removing from the sequence"
      re_engagement:  "Reaching out to a dormant contact after 90+ days"

  # ── Sequence step ─────────────────────────────────────────────────────────
  - name: sequence_step
    description: Position within a multi-step email sequence
    values:
      1: "Initial cold outreach — shortest, lowest-friction CTA"
      2: "First follow-up — adds value, references step 1"
      3: "Break-up or soft close — creates urgency or graceful exit"

  # ── Sender personas ───────────────────────────────────────────────────────
  - name: sender_persona
    values:
      sdr:        "Sales Development Representative — prospecting and first meetings"
      ae:         "Account Executive — deals and demos"
      csm:        "Customer Success Manager — retention and expansion"
      demand_gen: "Demand Generation Marketer — campaigns and pipeline"

  # ── Target personas ───────────────────────────────────────────────────────
  - name: target_persona
    values:
      vp_sales:      "VP of Sales or Head of Revenue at 50–500 person company"
      c_suite:       "CEO, CFO, COO at mid-market company"
      champion:      "Director or VP — internal champion at existing customer"
      cmo:           "Chief Marketing Officer or VP Marketing"
      marketing_ops: "Marketing Operations Manager — tool buyer"

  # ── Lead stage ────────────────────────────────────────────────────────────
  - name: lead_stage
    values:
      mql:   "Marketing Qualified Lead — engaged with content"
      sql:   "Sales Qualified Lead — ready for a sales conversation"
      trial: "Active trial user — evaluating the product"
      opp:   "Open opportunity — in active sales cycle"

  # ── CTA friction ─────────────────────────────────────────────────────────
  - name: cta_type
    values:
      low_friction:    "15-minute call, quick question, reply yes/no"
      medium_friction: "30-minute demo, join a webinar, review a one-pager"
      high_friction:   "Free trial, full demo, proposal review"

relationships:
  - from: sender_persona.sdr
    to:   target_persona.vp_sales
    context: "Outcome-first, peer-to-peer. References pipeline and quota."

  - from: sender_persona.ae
    to:   target_persona.c_suite
    context: "Executive framing. ROI, risk reduction, competitive positioning."

  - from: sender_persona.csm
    to:   target_persona.champion
    context: "Collaborative. Adoption metrics, NPS, value realization."

  - from: sender_persona.demand_gen
    to:   target_persona.cmo
    context: "Channel performance. MQL volume, attribution, CAC."

  - from: task_type.email_generation
    to:   sequence_step
    context: "Each email maps to a step number and CTA friction level."

  - from: lead_stage.mql
    to:   email_type.nurture
    context: "MQLs receive nurture drips, not cold outreach."

  - from: lead_stage.sql
    to:   cta_type.medium_friction
    context: "SQLs are ready for a demo ask."
