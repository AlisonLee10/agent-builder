<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Builder</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/drawflow@0.0.59/dist/drawflow.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #faf7f2;
      --panel:    #ede8df;
      --surface:  #f5f0e8;
      --border:   #c8bfb3;
      --text:     #2d2520;
      --muted:    #7a6f64;
      --accent:   #6366f1;
      --accent-h: #4f46e5;
      --danger:   #ef4444;
      --success:  #10b981;
    }

    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* ── Top bar ── */
    #topbar { display: flex; align-items: center; gap: 10px; padding: 0 14px; height: 50px; background: var(--panel); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    #topbar h1 { font-size: 15px; font-weight: 700; color: var(--text); white-space: nowrap; margin-right: 6px; }
    #topbar h1 span { color: var(--accent); }
    #wf-name { flex: 1; max-width: 220px; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 5px 10px; font-size: 13px; }
    #wf-name:focus { outline: none; border-color: var(--accent); }
    select#wf-load { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 5px 8px; font-size: 13px; }
    .btn { padding: 6px 14px; border-radius: 6px; border: none; font-size: 13px; cursor: pointer; font-weight: 600; transition: opacity .15s; }
    .btn:hover { opacity: .85; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-ghost   { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-danger  { background: var(--danger); color: #fff; }
    .btn-success { background: var(--success); color: #fff; }
    #topbar .sep { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }

    /* ── Main layout ── */
    #main { display: flex; flex: 1; overflow: hidden; }

    /* ── Left palette ── */
    #palette { width: 160px; background: var(--panel); border-right: 1px solid var(--border); padding: 12px 8px; flex-shrink: 0; overflow-y: auto; }
    #palette h2 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); padding: 0 4px 8px; }
    .palette-node { display: flex; align-items: center; gap: 8px; padding: 9px 10px; border-radius: 8px; margin-bottom: 6px; cursor: grab; font-size: 13px; font-weight: 600; border: 1px solid transparent; transition: border-color .15s, background .15s; user-select: none; }
    .palette-node:active { cursor: grabbing; }
    .palette-node:hover { border-color: var(--border); background: var(--surface); }
    .palette-node .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* ── Canvas ── */
    #canvas-wrap { flex: 1; position: relative; overflow: hidden; }
    #drawflow { width: 100%; height: 100%; }
    #canvas-hint { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; color: var(--muted); pointer-events: none; font-size: 14px; line-height: 1.8; }
    #canvas-hint.hidden { display: none; }

    /* ── Right panel ── */
    #right-panel { width: 280px; background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
    #panel-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .tab-btn { flex: 1; padding: 10px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; cursor: pointer; background: none; border: none; color: var(--muted); border-bottom: 2px solid transparent; transition: color .15s; }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-content { display: none; flex: 1; overflow-y: auto; padding: 14px; }
    .tab-content.active { display: block; }

    /* Config panel */
    #config-empty { color: var(--muted); font-size: 13px; text-align: center; margin-top: 40px; line-height: 1.8; }
    #config-form h3 { font-size: 14px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
    .field-group { margin-bottom: 12px; }
    .field-group label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 5px; }
    .field-group input, .field-group select, .field-group textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 7px 9px; font-size: 13px; }
    .field-group input:focus, .field-group select:focus, .field-group textarea:focus { outline: none; border-color: var(--accent); }
    .field-group textarea { resize: vertical; min-height: 70px; font-family: inherit; }
    #config-form .action-row { display: flex; gap: 8px; margin-top: 16px; }
    #config-form .action-row .btn { flex: 1; }

    /* Tools panel */
    #tools-panel h3 { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 10px; }
    .registry-item { background: var(--surface); border-radius: 8px; padding: 9px 10px; margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; }
    .registry-item-info { font-size: 12px; }
    .registry-item-name { font-weight: 700; color: var(--text); }
    .registry-item-type { color: var(--muted); font-size: 11px; margin-top: 2px; }
    .registry-item button { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 15px; padding: 2px 5px; border-radius: 4px; }
    .registry-item button:hover { color: var(--danger); background: rgba(239,68,68,.1); }
    .add-btn { display: flex; align-items: center; gap: 6px; width: 100%; padding: 8px 10px; background: var(--surface); border: 1px dashed var(--border); border-radius: 8px; color: var(--muted); font-size: 12px; cursor: pointer; margin-bottom: 12px; }
    .add-btn:hover { border-color: var(--accent); color: var(--accent); }
    .divider { height: 1px; background: var(--border); margin: 14px 0; }

    /* ── Modal ── */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 100; display: flex; align-items: center; justify-content: center; }
    .modal-backdrop.hidden { display: none; }
    .modal { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 420px; max-width: 95vw; }
    .modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 18px; }
    .modal .field-group { margin-bottom: 12px; }
    .modal .field-group label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 5px; }
    .modal .field-group input, .modal .field-group select, .modal .field-group textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 8px 10px; font-size: 13px; }
    .modal .field-group input:focus, .modal .field-group select:focus { outline: none; border-color: var(--accent); }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .modal-actions .btn { flex: 1; }

    /* Run result */
    #run-modal .result-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; font-size: 13px; line-height: 1.7; white-space: pre-wrap; max-height: 340px; overflow-y: auto; margin-bottom: 14px; }
    #run-modal .trace-toggle { font-size: 11px; color: var(--muted); cursor: pointer; text-decoration: underline; display: block; margin-bottom: 8px; }
    #run-modal .trace-box { background: var(--bg); border-radius: 8px; padding: 10px; font-size: 11px; font-family: monospace; max-height: 180px; overflow-y: auto; white-space: pre; display: none; }

    /* Drawflow overrides for dark theme */
    .drawflow { background: #faf7f2; background-image: radial-gradient(circle, #d6cfc4 1px, transparent 1px); background-size: 24px 24px; }
    .drawflow .drawflow-node { background: #ffffff; border: 1px solid var(--border); border-radius: 10px; padding: 0; min-width: 160px; box-shadow: 0 2px 8px rgba(0,0,0,.10); transition: background .15s; }
    .drawflow .drawflow-node.selected { background: #e8e3dc; border-color: #b0a898; box-shadow: 0 2px 10px rgba(0,0,0,.13); }
    .drawflow .drawflow-node .input,
    .drawflow .drawflow-node .output { background: var(--border) !important; border: 2px solid #ffffff; border-radius: 50%; width: 12px; height: 12px; }
    .drawflow .drawflow-node .input:hover,
    .drawflow .drawflow-node .output:hover { background: var(--accent) !important; }
    .drawflow .connection .main-path { stroke: var(--accent); stroke-width: 2.5; }
    .df-node-wrap { padding: 0; }
    .df-node-head { display: flex; align-items: center; gap: 7px; padding: 9px 12px 7px; font-size: 13px; font-weight: 700; border-radius: 9px 9px 0 0; }
    .df-node-body { padding: 8px 12px 10px; font-size: 12px; color: var(--muted); border-top: 1px solid var(--border); }
  </style>
</head>
<body>

<!-- Top bar -->
<div id="topbar">
  <h1>Agent <span>Builder</span></h1>
  <div class="sep"></div>
  <select id="wf-load" title="Load workflow"><option value="">Load workflow…</option></select>
  <input id="wf-name" type="text" placeholder="Workflow name" value="My Workflow">
  <button class="btn btn-ghost" onclick="newWorkflow()">New</button>
  <button class="btn btn-ghost" onclick="saveWorkflow()">Save</button>
  <div class="sep"></div>
  <button class="btn btn-success" onclick="openRunModal()">▶ Run</button>
</div>

<!-- Main layout -->
<div id="main">

  <!-- Left: node palette -->
  <div id="palette">
    <h2>Nodes</h2>
    <!-- filled by JS -->
  </div>

  <!-- Center: canvas -->
  <div id="canvas-wrap" ondragover="allowDrop(event)" ondrop="drop(event)">
    <div id="drawflow"></div>
    <div id="canvas-hint">
      <div style="font-size:28px;margin-bottom:8px">⬡</div>
      Drag nodes from the left panel<br>onto the canvas to build your workflow.<br>
      <span style="font-size:12px">Connect nodes by dragging from output ● to input ●</span>
    </div>
  </div>

  <!-- Right: config + tools -->
  <div id="right-panel">
    <div id="panel-tabs">
      <button class="tab-btn active" onclick="switchTab('config')">Config</button>
      <button class="tab-btn" onclick="switchTab('tools')">Tools & MCPs</button>
    </div>

    <!-- Config tab -->
    <div id="tab-config" class="tab-content active">
      <div id="config-empty">Select a node to<br>configure it here.</div>
      <div id="config-form" style="display:none"></div>
    </div>

    <!-- Tools tab -->
    <div id="tab-tools" class="tab-content">
      <h3>API Tools</h3>
      <button class="add-btn" onclick="openAddTool()">＋ Add Tool</button>
      <div id="tools-list"></div>

      <div class="divider"></div>

      <h3>MCP Servers</h3>
      <button class="add-btn" onclick="openAddMcp()">＋ Add MCP Server</button>
      <div id="mcps-list"></div>
    </div>
  </div>
</div>

<!-- Add Tool modal -->
<div id="tool-modal" class="modal-backdrop hidden">
  <div class="modal">
    <h2>Add Tool</h2>
    <div class="field-group"><label>Name</label><input id="t-name" placeholder="Web Search"></div>
    <div class="field-group">
      <label>Type</label>
      <select id="t-kind" onchange="updateToolFields()">
        <option value="http">HTTP API</option>
        <option value="tavily">Tavily Search</option>
        <option value="serpapi">SerpAPI</option>
      </select>
    </div>
    <div id="t-http-fields">
      <div class="field-group"><label>URL</label><input id="t-url" placeholder="https://api.example.com/query"></div>
      <div class="field-group"><label>Method</label>
        <select id="t-method"><option>POST</option><option>GET</option></select>
      </div>
    </div>
    <div id="t-key-field" class="field-group" style="display:none"><label>API Key</label><input id="t-apikey" type="password" placeholder="sk-…"></div>
    <div class="field-group"><label>Description (optional)</label><input id="t-desc" placeholder="Searches the web"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeTool()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTool()">Add Tool</button>
    </div>
  </div>
</div>

<!-- Add MCP modal -->
<div id="mcp-modal" class="modal-backdrop hidden">
  <div class="modal">
    <h2>Add MCP Server</h2>
    <div class="field-group"><label>Name</label><input id="m-name" placeholder="My MCP"></div>
    <div class="field-group"><label>Command</label><input id="m-cmd" placeholder="npx"></div>
    <div class="field-group"><label>Args (space-separated)</label><input id="m-args" placeholder="-y @modelcontextprotocol/server-fetch"></div>
    <div class="field-group"><label>Description (optional)</label><input id="m-desc" placeholder="Fetches web pages"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeMcp()">Cancel</button>
      <button class="btn btn-primary" onclick="saveMcp()">Add MCP</button>
    </div>
  </div>
</div>

<!-- Run modal -->
<div id="run-modal" class="modal-backdrop hidden">
  <div class="modal" style="width:520px">
    <h2>▶ Run Workflow</h2>
    <div id="run-input-section">
      <div class="field-group"><label>Override Prompt <span style="font-weight:400;text-transform:none;color:var(--muted)">(optional — leave blank to use the Input node's prompt)</span></label>
        <textarea id="run-prompt" rows="3" placeholder="Leave blank to use the prompt typed in the Input node…"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeRun()">Cancel</button>
        <button class="btn btn-success" id="run-go-btn" onclick="runWorkflow()">Run</button>
      </div>
    </div>
    <div id="run-result-section" style="display:none">
      <div class="field-group"><label>Result</label></div>
      <div class="result-box" id="run-result-text"></div>
      <a class="trace-toggle" onclick="toggleTrace()">Show execution trace</a>
      <div class="trace-box" id="run-trace-box"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeRun()">Close</button>
        <button class="btn btn-ghost" onclick="runAgain()">Run Again</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/drawflow@0.0.59/dist/drawflow.min.js"></script>
<script>
// ── State ──────────────────────────────────────────────────────────────────────
let editor, nodeTypes = [], toolsList = [], mcpsList = [];
let selectedNodeId = null, currentWfId = null;

// ── Bootstrap ─────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  initDrawflow();
  await Promise.all([loadNodeTypes(), loadWorkflowList(), loadRegistry()]);
});

function initDrawflow() {
  const container = document.getElementById('drawflow');
  editor = new Drawflow(container);
  editor.reroute = true;
  editor.start();

  editor.on('nodeSelected', id => { selectedNodeId = id; renderConfigPanel(); });
  editor.on('nodeUnselected', () => { selectedNodeId = null; clearConfigPanel(); });
  editor.on('nodeRemoved', () => updateCanvasHint());
  editor.on('nodeCreated', () => updateCanvasHint());
}

// ── Node types & palette ───────────────────────────────────────────────────────
async function loadNodeTypes() {
  const res = await fetch('/api/node-types');
  nodeTypes = await res.json();
  renderPalette();
}

function renderPalette() {
  const pal = document.getElementById('palette');
  // keep the h2
  const h2 = pal.querySelector('h2');
  pal.innerHTML = '';
  pal.appendChild(h2);
  for (const nt of nodeTypes) {
    const el = document.createElement('div');
    el.className = 'palette-node';
    el.draggable = true;
    el.dataset.type = nt.type;
    el.innerHTML = `<div class="dot" style="background:${nt.color}"></div>${nt.icon} ${nt.label}`;
    el.addEventListener('dragstart', e => e.dataTransfer.setData('nodeType', nt.type));
    pal.appendChild(el);
  }
}

// ── Drag & drop ───────────────────────────────────────────────────────────────
function allowDrop(e) { e.preventDefault(); }

function drop(e) {
  e.preventDefault();
  const type = e.dataTransfer.getData('nodeType');
  if (!type) return;
  addNode(type, e.clientX, e.clientY);
}

function addNode(type, clientX, clientY) {
  const nt = nodeTypes.find(n => n.type === type);
  if (!nt) return;

  const canvas = document.getElementById('drawflow');
  const rect = canvas.getBoundingClientRect();
  // Account for canvas pan and zoom
  const zoom = editor.zoom;
  const pos_x = (clientX - rect.left) * (1 / zoom) - editor.canvas_x * (1 / zoom);
  const pos_y = (clientY - rect.top)  * (1 / zoom) - editor.canvas_y * (1 / zoom);

  const defaultData = {};
  for (const f of nt.fields || []) {
    defaultData[f.key] = f.default !== undefined ? f.default : '';
  }

  const html = buildNodeHtml(nt, defaultData);
  editor.addNode(type, nt.inputs, nt.outputs, pos_x, pos_y, type, defaultData, html);
}

function buildNodeHtml(nt, data) {
  if (nt.type === 'input') {
    return `<div class="df-node-wrap">
      <div class="df-node-head" style="background:${nt.color}22;border-bottom:2px solid ${nt.color}">
        <span>${nt.icon}</span><span>${nt.label}</span>
      </div>
      <div class="df-node-body" style="padding:8px 10px 10px">
        <textarea df-prompt rows="3" placeholder="Type your prompt here…" style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:12px;color:var(--text);resize:vertical;font-family:inherit;line-height:1.5">${data.prompt || ''}</textarea>
      </div>
    </div>`;
  }
  const preview = getPreview(nt.type, data);
  return `<div class="df-node-wrap">
    <div class="df-node-head" style="background:${nt.color}22;border-bottom:2px solid ${nt.color}">
      <span>${nt.icon}</span><span>${nt.label}</span>
    </div>
    <div class="df-node-body">${preview}</div>
  </div>`;
}

function getPreview(type, data) {
  if (type === 'input')     return 'User prompt →';
  if (type === 'output')    return '→ Final output';
  if (type === 'llm')       return data.model || 'gpt-4o-mini';
  if (type === 'condition') return data.condition ? data.condition.slice(0,30) + '…' : 'Set a condition';
  if (type === 'tool') {
    const t = toolsList.find(x => x.id === data.tool_id);
    return t ? t.name : 'Select a tool';
  }
  return '';
}

function refreshNodeHtml(nodeId) {
  const node = editor.drawflow.drawflow.Home.data[nodeId];
  if (!node) return;
  const nt = nodeTypes.find(n => n.type === node.name);
  if (!nt) return;
  // Drawflow doesn't expose a direct HTML-update API; we patch the DOM directly.
  const el = document.querySelector(`.drawflow-node[id="node-${nodeId}"] .df-node-body`);
  if (el) el.textContent = getPreview(nt.type, node.data);
}

// ── Config panel ──────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['config','tools'][i] === name);
  });
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');
}

function clearConfigPanel() {
  document.getElementById('config-empty').style.display = '';
  document.getElementById('config-form').style.display = 'none';
}

function renderConfigPanel() {
  if (!selectedNodeId) return clearConfigPanel();
  const node = editor.drawflow.drawflow.Home.data[selectedNodeId];
  if (!node) return;
  const nt = nodeTypes.find(n => n.type === node.name);
  if (!nt) return;

  document.getElementById('config-empty').style.display = 'none';
  const form = document.getElementById('config-form');
  form.style.display = '';

  let html = `<h3>${nt.icon} ${nt.label}</h3>`;
  for (const f of nt.fields || []) {
    html += `<div class="field-group"><label>${f.label}</label>`;
    if (f.type === 'select') {
      html += `<select id="cf-${f.key}">`;
      for (const o of f.options) html += `<option${node.data[f.key]===o?' selected':''}>${o}</option>`;
      html += '</select>';
    } else if (f.type === 'textarea') {
      html += `<textarea id="cf-${f.key}" rows="4">${node.data[f.key]||f.default||''}</textarea>`;
    } else if (f.type === 'tool_select') {
      html += `<select id="cf-${f.key}"><option value="">— select —</option>`;
      for (const t of toolsList) html += `<option value="${t.id}"${node.data[f.key]===t.id?' selected':''}>${t.name} (${t.kind})</option>`;
      html += '</select>';
    } else if (f.type === 'number') {
      html += `<input id="cf-${f.key}" type="number" min="${f.min||0}" max="${f.max||10}" step="${f.step||1}" value="${node.data[f.key]!==undefined?node.data[f.key]:f.default}">`;
    } else {
      html += `<input id="cf-${f.key}" type="text" value="${node.data[f.key]||''}">`;
    }
    html += '</div>';
  }
  html += `<div class="action-row">
    <button class="btn btn-primary" onclick="applyConfig()">Apply</button>
    <button class="btn btn-danger" onclick="deleteNode()">Delete</button>
  </div>`;
  form.innerHTML = html;
}

function applyConfig() {
  if (!selectedNodeId) return;
  const node = editor.drawflow.drawflow.Home.data[selectedNodeId];
  if (!node) return;
  const nt = nodeTypes.find(n => n.type === node.name);
  for (const f of nt.fields || []) {
    const el = document.getElementById(`cf-${f.key}`);
    if (el) node.data[f.key] = el.value;
  }
  refreshNodeHtml(selectedNodeId);
}

function deleteNode() {
  if (!selectedNodeId) return;
  editor.removeNodeId(`node-${selectedNodeId}`);
  selectedNodeId = null;
  clearConfigPanel();
}

function updateCanvasHint() {
  const data = editor.drawflow.drawflow.Home.data;
  const hasNodes = Object.keys(data).length > 0;
  document.getElementById('canvas-hint').classList.toggle('hidden', hasNodes);
}

// ── Workflow save / load ──────────────────────────────────────────────────────
async function loadWorkflowList() {
  const res = await fetch('/api/workflows');
  const list = await res.json();
  const sel = document.getElementById('wf-load');
  sel.innerHTML = '<option value="">Load workflow…</option>';
  for (const w of list) {
    const opt = document.createElement('option');
    opt.value = w.id; opt.textContent = w.name;
    sel.appendChild(opt);
  }
  sel.onchange = () => { if (sel.value) loadWorkflow(sel.value); };
}

async function loadWorkflow(id) {
  const res = await fetch(`/api/workflows/${id}`);
  if (!res.ok) return alert('Could not load workflow.');
  const wf = await res.json();
  currentWfId = wf.id;
  document.getElementById('wf-name').value = wf.name;

  if (wf.drawflow) {
    editor.import(wf.drawflow);
  } else {
    editor.clearModuleSelected();
    importEngineFormat(wf);
  }
  updateCanvasHint();
  clearConfigPanel();
}

function importEngineFormat(wf) {
  const df = { drawflow: { Home: { data: {} } } };
  const cols = 3, spacing = { x: 220, y: 160 }, start = { x: 80, y: 80 };
  wf.nodes.forEach((n, i) => {
    const nt = nodeTypes.find(t => t.type === n.type) || { inputs: 1, outputs: 1 };
    const numId = i + 1;
    df.drawflow.Home.data[numId] = {
      id: numId, name: n.type, data: n.config || {},
      class: n.type,
      html: buildNodeHtml(nt, n.config || {}),
      typenode: false,
      inputs:  buildPorts('input',  nt.inputs),
      outputs: buildPorts('output', nt.outputs),
      pos_x: start.x + (i % cols) * spacing.x,
      pos_y: start.y + Math.floor(i / cols) * spacing.y,
    };
    n._numId = numId;
  });
  // Wire edges
  for (const e of (wf.edges || [])) {
    const src = wf.nodes.find(n => n.id === e.source);
    const tgt = wf.nodes.find(n => n.id === e.target);
    if (!src || !tgt) continue;
    const srcData = df.drawflow.Home.data[src._numId];
    const tgtData = df.drawflow.Home.data[tgt._numId];
    if (!srcData || !tgtData) continue;
    srcData.outputs.output_1.connections.push({ node: String(tgt._numId), output: 'input_1' });
    tgtData.inputs.input_1.connections.push({ node: String(src._numId), input: 'output_1' });
  }
  editor.import(df);
}

function buildPorts(kind, count) {
  const result = {};
  for (let i = 1; i <= count; i++) {
    result[`${kind}_${i}`] = { connections: [] };
  }
  return result;
}

async function saveWorkflow() {
  const name = document.getElementById('wf-name').value.trim() || 'Untitled';
  const dfExport = editor.export();
  const { nodes, edges } = toEngineFormat(dfExport);

  const body = { name, nodes, edges, drawflow: dfExport };
  const url  = currentWfId ? `/api/workflows/${currentWfId}` : '/api/workflows';
  const method = currentWfId ? 'PUT' : 'POST';

  const res = await fetch(url, {
    method, headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!res.ok) return alert('Save failed: ' + await res.text());
  const saved = await res.json();
  currentWfId = saved.id;
  await loadWorkflowList();
  document.getElementById('wf-load').value = currentWfId;
  showToast('Saved ✓');
}

function newWorkflow() {
  currentWfId = null;
  document.getElementById('wf-name').value = 'My Workflow';
  document.getElementById('wf-load').value = '';
  editor.clearModuleSelected();
  clearConfigPanel();
  updateCanvasHint();
}

function toEngineFormat(dfExport) {
  const dfData = dfExport.drawflow.Home.data;
  const nodes = [], edges = [];
  for (const [id, node] of Object.entries(dfData)) {
    nodes.push({ id: String(id), type: node.name, config: { ...node.data } });
    for (const portData of Object.values(node.outputs || {})) {
      for (const conn of portData.connections || []) {
        edges.push({ source: String(id), target: String(conn.node) });
      }
    }
  }
  return { nodes, edges };
}

// ── Run workflow ──────────────────────────────────────────────────────────────
function openRunModal() {
  document.getElementById('run-input-section').style.display = '';
  document.getElementById('run-result-section').style.display = 'none';
  document.getElementById('run-prompt').value = '';
  document.getElementById('run-modal').classList.remove('hidden');
}
function closeRun() { document.getElementById('run-modal').classList.add('hidden'); }
function runAgain() {
  document.getElementById('run-input-section').style.display = '';
  document.getElementById('run-result-section').style.display = 'none';
}

async function runWorkflow() {
  const prompt = document.getElementById('run-prompt').value.trim();

  // Auto-save first if unsaved
  if (!currentWfId) await saveWorkflow();
  if (!currentWfId) return;

  const btn = document.getElementById('run-go-btn');
  btn.textContent = 'Running…'; btn.disabled = true;

  const res = await fetch(`/api/workflows/${currentWfId}/run`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt }),
  });

  btn.textContent = 'Run'; btn.disabled = false;

  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: res.statusText }));
    return alert('Error: ' + (err.detail || res.statusText));
  }

  const data = await res.json();
  document.getElementById('run-input-section').style.display = 'none';
  document.getElementById('run-result-section').style.display = '';
  document.getElementById('run-result-text').textContent = data.result || '(no output)';
  document.getElementById('run-trace-box').textContent = JSON.stringify(data.trace, null, 2);
  document.getElementById('run-trace-box').style.display = 'none';
}

function toggleTrace() {
  const box = document.getElementById('run-trace-box');
  box.style.display = box.style.display === 'none' ? '' : 'none';
}

// ── Tool registry ─────────────────────────────────────────────────────────────
async function loadRegistry() {
  const [tRes, mRes] = await Promise.all([fetch('/api/tools'), fetch('/api/mcps')]);
  toolsList = await tRes.json();
  mcpsList  = await mRes.json();
  renderRegistry();
}

function renderRegistry() {
  const tl = document.getElementById('tools-list');
  tl.innerHTML = toolsList.map(t => `
    <div class="registry-item">
      <div class="registry-item-info">
        <div class="registry-item-name">${t.name}</div>
        <div class="registry-item-type">${t.kind}${t.description ? ' · ' + t.description : ''}</div>
      </div>
      <button onclick="removeTool('${t.id}')">✕</button>
    </div>`).join('') || '<div style="color:var(--muted);font-size:12px">No tools added yet.</div>';

  const ml = document.getElementById('mcps-list');
  ml.innerHTML = mcpsList.map(m => `
    <div class="registry-item">
      <div class="registry-item-info">
        <div class="registry-item-name">${m.name}</div>
        <div class="registry-item-type">${m.command}${m.description ? ' · ' + m.description : ''}</div>
      </div>
      <button onclick="removeMcp('${m.id}')">✕</button>
    </div>`).join('') || '<div style="color:var(--muted);font-size:12px">No MCP servers added yet.</div>';
}

function openAddTool() { updateToolFields(); document.getElementById('tool-modal').classList.remove('hidden'); }
function closeTool()   { document.getElementById('tool-modal').classList.add('hidden'); }

function updateToolFields() {
  const kind = document.getElementById('t-kind').value;
  document.getElementById('t-http-fields').style.display = kind === 'http' ? '' : 'none';
  document.getElementById('t-key-field').style.display   = kind !== 'http' ? '' : 'none';
}

async function saveTool() {
  const body = {
    name:        document.getElementById('t-name').value.trim(),
    kind:        document.getElementById('t-kind').value,
    url:         document.getElementById('t-url').value.trim(),
    method:      document.getElementById('t-method').value,
    api_key:     document.getElementById('t-apikey').value.trim(),
    description: document.getElementById('t-desc').value.trim(),
    headers: {},
  };
  if (!body.name) return alert('Tool name is required.');
  const res = await fetch('/api/tools', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  if (!res.ok) return alert('Failed: ' + await res.text());
  closeTool();
  await loadRegistry();
}

async function removeTool(id) {
  if (!confirm('Remove this tool?')) return;
  await fetch(`/api/tools/${id}`, { method: 'DELETE' });
  await loadRegistry();
  if (selectedNodeId) renderConfigPanel(); // refresh tool_select dropdown
}

function openAddMcp() { document.getElementById('mcp-modal').classList.remove('hidden'); }
function closeMcp()   { document.getElementById('mcp-modal').classList.add('hidden'); }

async function saveMcp() {
  const body = {
    name:        document.getElementById('m-name').value.trim(),
    command:     document.getElementById('m-cmd').value.trim(),
    args:        document.getElementById('m-args').value.trim().split(/\s+/).filter(Boolean),
    description: document.getElementById('m-desc').value.trim(),
    env: {},
  };
  if (!body.name || !body.command) return alert('Name and command are required.');
  const res = await fetch('/api/mcps', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  if (!res.ok) return alert('Failed: ' + await res.text());
  closeMcp();
  await loadRegistry();
}

async function removeMcp(id) {
  if (!confirm('Remove this MCP server?')) return;
  await fetch(`/api/mcps/${id}`, { method: 'DELETE' });
  await loadRegistry();
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#10b981;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:700;z-index:999;transition:opacity .4s';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 400); }, 1800);
}

// Close modals on backdrop click
document.querySelectorAll('.modal-backdrop').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.add('hidden'); });
});

// Delete selected node with Backspace/Delete key
document.addEventListener('keydown', e => {
  const tag = document.activeElement.tagName;
  if ((e.key === 'Delete' || e.key === 'Backspace') && !['INPUT','TEXTAREA','SELECT'].includes(tag)) {
    if (selectedNodeId) deleteNode();
  }
});
</script>
